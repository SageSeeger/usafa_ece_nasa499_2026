<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Telemetry Upload</title>
    <meta name="description" content="USAFA NASA ECE 499 — Flight Telemetry XLSX Upload">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- SheetJS for XLSX parsing (client-side) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Flight Telemetry Upload</h1>
            <p class="subtitle">Upload a <strong>.xlsx</strong> telemetry file to store in the database.</p>
        </div>

        <!-- File Picker -->
        <div class="xlsx-upload-area">
            <input type="file" id="xlsxFileInput" accept=".xlsx,.xls">
            <label for="xlsxFileInput" id="xlsxFileLabel">📂 Choose XLSX File</label>
        </div>

        <div id="xlsxStatus"></div>

        <!-- Confirmation card — shown after parsing, before upload -->
        <div id="xlsxConfirm" class="confirm-card" style="display:none;">
            <h2 class="confirm-title">File Summary</h2>
            <div class="confirm-grid">
                <div class="confirm-item">
                    <span class="confirm-label">File</span>
                    <span id="confirmFileName" class="confirm-value">—</span>
                </div>
                <div class="confirm-item">
                    <span class="confirm-label">Rows</span>
                    <span id="confirmRowCount" class="confirm-value">—</span>
                </div>
                <div class="confirm-item">
                    <span class="confirm-label">Columns</span>
                    <span id="confirmColCount" class="confirm-value">—</span>
                </div>
                <div class="confirm-item">
                    <span class="confirm-label">Time Range</span>
                    <span id="confirmTimeRange" class="confirm-value">—</span>
                </div>
                <div class="confirm-item">
                    <span class="confirm-label">GPS Synced Rows</span>
                    <span id="confirmGpsSynced" class="confirm-value">—</span>
                </div>
                <div class="confirm-item">
                    <span class="confirm-label">Avg Battery Voltage</span>
                    <span id="confirmAvgVolt" class="confirm-value">—</span>
                </div>
            </div>

            <!-- First 3 rows preview -->
            <details class="preview-details">
                <summary>Preview first 3 rows</summary>
                <div class="preview-scroll">
                    <table id="xlsxPreviewTable" class="csv-data-table"></table>
                </div>
            </details>

            <button id="xlsxUploadBtn">⬆ Upload to Database</button>
        </div>

        <!-- Result shown after upload -->
        <div id="xlsxResult" style="display:none;" class="result-card">
            <span id="xlsxResultText"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
